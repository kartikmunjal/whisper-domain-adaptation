name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Core deps needed by the test suite (no Whisper model download required)
          pip install librosa numpy pandas jiwer transformers peft tqdm soundfile
          # Install the package so `from whisper_adapt.*` imports resolve
          pip install -e .
          pip install pytest

      - name: Run tests
        # Skip TestBuildWhisperLora — those tests download the whisper-small checkpoint
        # (~460 MB). Run locally with `pytest tests/ -v` after `pip install -e .`.
        run: pytest tests/ -v --tb=short -k "not BuildWhisper"
