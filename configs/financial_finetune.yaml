model:
  base_model: openai/whisper-small
  language: en
  task: transcribe

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - out_proj
    - fc1
    - fc2
  bias: none

data:
  financial:
    # TTS synthesis using Edge-TTS — same voice catalog as
    # rlhf-and-reward-modelling-alt/src/data/tts_preferences.py
    output_dir: data/financial_synth
    max_synthetic_ratio: 1.0   # all synthetic for financial domain
  quality:
    min_snr_db: 20.0           # TTS is clean; higher threshold than real audio
    max_silence_ratio: 0.50
    min_duration_sec: 1.0
    max_duration_sec: 20.0
  sample_rate: 16000

training:
  output_dir: checkpoints/financial
  num_train_epochs: 5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-5
  warmup_steps: 200
  eval_steps: 200
  save_steps: 200
  logging_steps: 25
  fp16: true
  gradient_checkpointing: true
  early_stopping_patience: 5
  push_to_hub: false

evaluation:
  domain_terms_file: configs/financial_terms.txt
  output_dir: experiments/results/financial
