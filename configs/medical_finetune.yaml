model:
  base_model: openai/whisper-small
  language: en
  task: transcribe

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - out_proj
    - fc1
    - fc2
  bias: none

data:
  medical:
    dataset_id: speech-recognition/medical-speech-transcription
    train_split: train
    eval_split: validation
    max_train_samples: 10000
  quality:
    min_snr_db: 15.0
    max_silence_ratio: 0.40
    min_duration_sec: 0.5
    max_duration_sec: 30.0
  sample_rate: 16000

training:
  output_dir: checkpoints/medical
  num_train_epochs: 3
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  warmup_steps: 500
  eval_steps: 500
  save_steps: 500
  logging_steps: 25
  fp16: true
  gradient_checkpointing: true
  early_stopping_patience: 5
  push_to_hub: false

evaluation:
  domain_terms_file: configs/medical_terms.txt
  output_dir: experiments/results/medical
